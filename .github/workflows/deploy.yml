name: Deploy MyST Site to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install MyST Markdown
        run: npm install -g mystmd

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Download fonts
        run: |
          mkdir -p fonts
          # Source Sans Pro (body font)
          curl -sL "https://github.com/adobe-fonts/source-sans-pro/releases/download/3.006R/source-sans-pro-3.006R.zip" -o source-sans-pro.zip
          unzip -o source-sans-pro.zip -d /tmp/ssp
          cp /tmp/ssp/source-sans-pro-3.006R/OTF/*.otf fonts/
          # Font Awesome 6 (icons)
          curl -sL "https://use.fontawesome.com/releases/v6.7.2/fontawesome-free-6.7.2-desktop.zip" -o fa.zip
          unzip -o fa.zip -d /tmp/fa
          cp /tmp/fa/fontawesome-free-6.7.2-desktop/otfs/*.otf fonts/

      - name: Generate CV Typst source
        run: python generate_cv.py

      - name: Compile CV PDF
        run: typst compile cv.typ cv.pdf --font-path ./fonts --ignore-system-fonts

      - name: Publish static article PDF from public assets
        run: python build_pdf.py

      - name: Build HTML Assets
        env:
          BASE_URL: /${{ github.event.repository.name }}
        run: myst build --html

      - name: Generate RSS and Atom feeds
        run: python generate_rss.py

      - name: Copy static files and rewrite CV URL to stable path
        run: |
          set -e

          # Copy CV PDF
          if [ -f cv.pdf ]; then
            cp cv.pdf ./_build/html/cv.pdf
          fi

          # Article PDF (copy into the published site root so the relative link resolves)
          if [ -f _build/exports/groundwater_mueda.pdf ]; then
            mkdir -p ./_build/html/articles
            cp _build/exports/groundwater_mueda.pdf ./_build/html/articles/Mausse_2026_Groundwater_Potential_Mueda.pdf
            cp _build/exports/groundwater_mueda.pdf ./_build/html/groundwater_mueda.pdf
            echo "Copied groundwater_mueda.pdf to ./_build/html/articles/ and ./_build/html/"
          else
            echo "WARNING: groundwater_mueda.pdf not found, skipping"
          fi

          # Copy RSS Feeds
          cp rss.xml  ./_build/html/rss.xml  2>/dev/null || true
          cp atom.xml ./_build/html/atom.xml 2>/dev/null || true

          # Rewrite hashed CV URL to stable /cv.pdf path (just in case)
          find ./_build/html -name "*.html" -exec sed -i 's|/build/cv-[a-f0-9]\{20,\}\.pdf|/cv.pdf|g' {} \;

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./_build/html"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
