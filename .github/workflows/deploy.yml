# ╔═══════════════════════════════════════════════════════════════╗
# ║  Deploy MyST Portfolio to GitHub Pages                       ║
# ║  Builds: HTML site + CV PDF (Typst) + Article PDF + RSS     ║
# ╚═══════════════════════════════════════════════════════════════╝

name: Deploy MyST Site to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:           # Allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repository ──────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup runtimes ───────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      # ── 3. Install tools ────────────────────────────────────
      - name: Install MyST Markdown
        run: npm install -g mystmd

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 4. Generate CV PDF from Markdown pages ──────────────
      - name: Generate CV (Typst)
        run: |
          python generate_cv.py
          echo "--- cv.typ preview (first 20 lines) ---"
          head -20 cv.typ

      # ── 5. Generate Article PDF (groundwater_mueda) ─────────
      - name: Generate Article PDF
        run: python build_pdf.py

      # ── 6. Generate RSS/Atom feeds from blog posts ─────────
      - name: Generate RSS feeds
        run: python generate_rss.py

      # ── 7. Build the MyST HTML site ─────────────────────────
      - name: Build MyST site
        run: myst build --html

      # ── 8. Copy generated assets into the HTML build ────────
      - name: Copy assets to _build/html
        run: |
          # CV PDF
          if [ -f cv.pdf ]; then
            cp cv.pdf _build/html/cv.pdf
            echo "Copied cv.pdf"
          else
            echo "WARNING: cv.pdf not found, skipping"
          fi

          # Article PDF
          if [ -f pages/artigos/groundwater_mueda.pdf ]; then
            cp pages/artigos/groundwater_mueda.pdf _build/html/pages/artigos/groundwater_mueda.pdf
            echo "Copied groundwater_mueda.pdf"
          elif [ -f _build/exports/groundwater_mueda.pdf ]; then
            cp _build/exports/groundwater_mueda.pdf _build/html/pages/artigos/groundwater_mueda.pdf
            echo "Copied groundwater_mueda.pdf from exports"
          fi

          # RSS / Atom feeds
          cp rss.xml  _build/html/rss.xml  2>/dev/null && echo "Copied rss.xml"  || true
          cp atom.xml _build/html/atom.xml 2>/dev/null && echo "Copied atom.xml" || true

          echo "--- Final _build/html root contents ---"
          ls -la _build/html/

      # ── 9. Upload to GitHub Pages artifact ──────────────────
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_build/html"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
