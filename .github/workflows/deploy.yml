name: Deploy MyST Site to GitHub Pages

on:
  push:
    branches:
      - main
      - master

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install MyST Markdown
        run: npm install -g mystmd

      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      - name: Build PDF and CV
        run: |
          pip install -r requirements.txt
          python build_pdf.py
          python generate_cv.py
          python generate_rss.py

      - name: Build MyST site
        run: myst build --html

      - name: Copy files to HTML build
        run: |
          cp groundwater_mueda.pdf _build/html/pages/artigos/groundwater_mueda.pdf || true
          cp public/cv.pdf _build/html/cv.pdf || true
          cp rss.xml _build/html/rss.xml || true
          cp atom.xml _build/html/atom.xml || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire _build/html directory
          path: '_build/html'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
